<!-- Botón flotante -->
<button class="accessibility-fab" 
        (click)="togglePanel()"
        [attr.aria-label]="isOpen ? 'Cerrar panel de accesibilidad' : 'Abrir panel de accesibilidad'"
        [attr.aria-expanded]="isOpen"
        title="Accesibilidad">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
  </svg>
</button>

<!-- Panel lateral -->
<div class="accessibility-panel" [class.open]="isOpen">
  <div class="panel-header">
    <h3>♿ Accesibilidad</h3>
    <button class="close-btn" (click)="closePanel()" aria-label="Cerrar panel">✕</button>
  </div>

  <div class="panel-content">
    
    <!-- Tema -->
    <div class="control-group">
      <label class="control-label">Tema</label>
      <div class="button-group">
        <button class="control-btn" 
                [class.active]="accessibilityService.getTheme() === 'light'"
                (click)="accessibilityService.setTheme('light')"
                aria-label="Tema claro">
          ☀️ Claro
        </button>
        <button class="control-btn" 
                [class.active]="accessibilityService.getTheme() === 'dark'"
                (click)="accessibilityService.setTheme('dark')"
                aria-label="Tema oscuro">
          🌙 Oscuro
        </button>
      </div>
    </div>

    <!-- Tamaño de texto -->
    <div class="control-group">
      <label class="control-label">Tamaño de texto</label>
      <div class="button-group">
        <button class="control-btn size-btn" 
                [class.active]="accessibilityService.getFontSize() === 'normal'"
                (click)="accessibilityService.setFontSize('normal')"
                aria-label="Texto normal">
          A
        </button>
        <button class="control-btn size-btn" 
                [class.active]="accessibilityService.getFontSize() === 'large'"
                (click)="accessibilityService.setFontSize('large')"
                aria-label="Texto grande">
          A+
        </button>
        <button class="control-btn size-btn" 
                [class.active]="accessibilityService.getFontSize() === 'xlarge'"
                (click)="accessibilityService.setFontSize('xlarge')"
                aria-label="Texto muy grande">
          A++
        </button>
      </div>
    </div>

    <!-- Desactivar interrupciones -->
    <div class="control-group">
      <label class="control-label">Desactivar interrupciones</label>
      <label class="switch">
        <input type="checkbox" 
               [checked]="accessibilityService.getDisableInterruptions()"
               (change)="accessibilityService.setDisableInterruptions($any($event.target).checked)"
               aria-label="Activar o desactivar modo sin interrupciones">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Nivel de contraste -->
    <div class="control-group">
      <label class="control-label">Nivel de contraste</label>
      <div class="button-group">
        <button class="control-btn" 
                [class.active]="accessibilityService.getContrastLevel() === 'normal'"
                (click)="accessibilityService.setContrastLevel('normal')"
                aria-label="Contraste normal">
          Normal
        </button>
        <button class="control-btn" 
                [class.active]="accessibilityService.getContrastLevel() === 'medium'"
                (click)="accessibilityService.setContrastLevel('medium')"
                aria-label="Contraste medio">
          Medio
        </button>
        <button class="control-btn" 
                [class.active]="accessibilityService.getContrastLevel() === 'high'"
                (click)="accessibilityService.setContrastLevel('high')"
                aria-label="Contraste alto">
          Alto
        </button>
      </div>
    </div>

  </div>
</div>

<!-- Overlay para cerrar al hacer clic fuera -->
<div class="accessibility-overlay" 
     *ngIf="isOpen" 
     (click)="closePanel()"
     aria-hidden="true"></div>
