<!-- Ventana del chat -->
<div class="chat-window" 
     [class.open]="isOpen"
     [class.hidden-by-accessibility]="accessibilityPanelOpen">
  <div class="chat-header">
    <div class="header-info">
      <div class="bot-avatar">
        <svg width="22" height="22" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="10" r="8"/>
          <rect x="46" y="18" width="8" height="10" rx="2"/>
          <rect x="8" y="42" width="10" height="20" rx="4"/>
          <rect x="82" y="42" width="10" height="20" rx="4"/>
          <rect x="18" y="28" width="64" height="54" rx="16"/>
          <circle cx="36" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
          <circle cx="64" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
        </svg>
      </div>
      <div>
        <div class="bot-name">Asistente de Autenticación</div>
        <div class="bot-status">
          <span class="status-dot"></span> En línea
        </div>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()" aria-label="Cerrar chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <div class="chat-messages" id="auth-chat-messages">
    <div *ngFor="let msg of messages"
         class="message"
         [class.user]="msg.role === 'user'"
         [class.bot]="msg.role === 'model'">
      <div class="avatar" *ngIf="msg.role === 'model'">
        <svg width="14" height="14" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="10" r="8"/>
          <rect x="46" y="18" width="8" height="10" rx="2"/>
          <rect x="8" y="42" width="10" height="20" rx="4"/>
          <rect x="82" y="42" width="10" height="20" rx="4"/>
          <rect x="18" y="28" width="64" height="54" rx="16"/>
          <circle cx="36" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
          <circle cx="64" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
        </svg>
      </div>
      <div class="bubble" [innerHTML]="formatMessage(msg.text)"></div>
    </div>

    <div class="message bot" *ngIf="isLoading">
      <div class="avatar">
        <svg width="14" height="14" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="10" r="8"/>
          <rect x="46" y="18" width="8" height="10" rx="2"/>
          <rect x="8" y="42" width="10" height="20" rx="4"/>
          <rect x="82" y="42" width="10" height="20" rx="4"/>
          <rect x="18" y="28" width="64" height="54" rx="16"/>
          <circle cx="36" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
          <circle cx="64" cy="52" r="8" fill="rgba(0,0,0,0.35)"/>
        </svg>
      </div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="inputText"
      placeholder="Escribe tu mensaje..."
      (keydown)="handleKey($event)"
      [disabled]="isLoading"
      class="input-field"
    />
    <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputText.trim()" aria-label="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Botón FAB con robot SVG -->
<button class="fab-btn" 
        [class.hidden-by-accessibility]="accessibilityPanelOpen"
        (click)="toggleChat()" 
        [attr.aria-label]="isOpen ? 'Cerrar chat' : 'Abrir asistente de autenticación'">
  <div class="fab-icon" [class.hidden]="isOpen">
    <svg width="30" height="30" viewBox="0 0 100 85" fill="white" xmlns="http://www.w3.org/2000/svg">
      <!-- Antena -->
      <circle cx="40" cy="5" r="5"/>
      <rect x="37" y="10" width="6" height="8" rx="2"/>
      <!-- Orejas -->
      <rect x="0" y="30" width="8" height="16" rx="3"/>
      <rect x="68" y="30" width="8" height="16" rx="3"/>
      <!-- Cabeza -->
      <rect x="10" y="18" width="58" height="46" rx="14"/>
      <!-- Ojos -->
      <circle cx="29" cy="38" r="7" fill="rgba(0,0,0,0.3)"/>
      <circle cx="49" cy="38" r="7" fill="rgba(0,0,0,0.3)"/>
      <!-- Burbuja de mensaje -->
      <rect x="52" y="2" width="44" height="28" rx="8"/>
      <path d="M58 30 L52 38 L68 30 Z"/>
      <!-- Puntos en burbuja -->
      <circle cx="63" cy="16" r="3.5" fill="rgba(0,0,0,0.35)"/>
      <circle cx="74" cy="16" r="3.5" fill="rgba(0,0,0,0.35)"/>
      <circle cx="85" cy="16" r="3.5" fill="rgba(0,0,0,0.35)"/>
    </svg>
  </div>
  <div class="fab-close" [class.hidden]="!isOpen">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </div>
</button>
