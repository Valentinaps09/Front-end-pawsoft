<!-- Ventana del chat -->
<div class="chat-window" [class.open]="isOpen">
  <div class="chat-header">
    <div class="header-info">
      <div class="bot-avatar">🐾</div>
      <div>
        <div class="bot-name">PawBot</div>
        <div class="bot-status">Asistente Virtual</div>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()" aria-label="Cerrar chat">✕</button>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div *ngFor="let msg of messages"
         class="message"
         [class.user]="msg.role === 'user'"
         [class.bot]="msg.role === 'model'">
      <div class="avatar" *ngIf="msg.role === 'model'">🐾</div>
      <div class="bubble" [innerHTML]="formatMessage(msg.text)"></div>
    </div>

    <div class="message bot" *ngIf="isLoading">
      <div class="avatar">🐾</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="inputText"
      placeholder="Escribe tu mensaje..."
      (keydown)="handleKey($event)"
      [disabled]="isLoading"
      class="input-field"
    />
    <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputText.trim()" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Botón FAB -->
<button class="fab-btn" (click)="toggleChat()" [attr.aria-label]="isOpen ? 'Cerrar chat' : 'Abrir asistente virtual'">
  <svg *ngIf="!isOpen" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
  </svg>
  <svg *ngIf="isOpen" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
  </svg>
</button>
